<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CrowdSense AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0a0a1a; display: flex; align-items: center; justify-content: center; padding: 20px; }
.container { width: 100%; max-width: 420px; }
.card { background: #13132b; border: 1px solid #2a2a4a; border-radius: 24px; padding: 40px; }
.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; justify-content: center; }
.logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.logo-text { font-size: 24px; font-weight: 700; color: white; }
h2 { color: white; font-size: 24px; text-align: center; margin-bottom: 8px; }
.subtitle { color: #888; text-align: center; font-size: 14px; margin-bottom: 30px; }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; color: #aaa; font-size: 13px; margin-bottom: 8px; }
.input-group input { width: 100%; padding: 14px 16px; background: #1a1a3a; border: 1px solid #2a2a4a; border-radius: 12px; color: white; font-size: 15px; outline: none; transition: border 0.3s; }
.input-group input:focus { border-color: #6366f1; }
.btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
.btn:hover { transform: translateY(-2px); }
.btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: none; }
.error.show { display: block; }
.note { text-align: center; color: #666; font-size: 12px; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">AI</div>
      <span class="logo-text">CrowdSense</span>
    </div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to access the dashboard</p>
    <div class="error" id="error"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn" id="btn">Sign In</button>
    </form>
    <p class="note">Demo: Use any email with password (4+ chars)</p>
  </div>
</div>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const error = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  error.classList.remove('show');
  
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    const data = await res.json();
    if (data.success) window.location.href = '/';
    else { error.textContent = 'Invalid credentials'; error.classList.add('show'); }
  } catch { error.textContent = 'Connection error'; error.classList.add('show'); }
  
  btn.disabled = false;
  btn.textContent = 'Sign In';
}
</script>
</body>
</html>
